<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>The Internet Public Radio Directory</title>

<style>
body {
    font-family: system-ui, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #20232a;
    color: white;
    padding: 1rem;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 1rem;
}

.search {
    width: 100%;
    padding: .8rem;
    font-size: 1rem;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.filters {
    margin: 1rem 0;
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
}

select {
    padding: .5rem;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(280px,1fr));
    gap: 1rem;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 1rem;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

.card h3 {
    margin-top: 0;
}

.meta {
    color: #666;
    font-size: .9rem;
}

button {
    margin-top: .8rem;
    padding: .5rem .8rem;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <h1>The IPRD database</h1>
</header>

<div class="container">

    <input
        id="search"
        class="search"
        placeholder="Search stations..."
    >

    <div class="filters">
        <select id="country">
            <option value="">All countries</option>
        </select>

        <select id="category">
            <option value="">All categories</option>
        </select>
    </div>

    <div id="results" class="grid"></div>

</div>

<script src="app.js"></script>

</body>
</html>
